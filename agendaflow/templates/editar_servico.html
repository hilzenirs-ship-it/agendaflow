<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar serviço - AgendaFlow</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

{% include 'base.html' %}

<div class="container">
    <div class="card">
        <h1>Editar serviço</h1>

        <form method="POST">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

            <div class="campo">
                <label for="nome">Nome do serviço</label>
                <input type="text" id="nome" name="nome" value="{{ servico.nome }}" required minlength="1" maxlength="100">
            </div>

            <div class="campo">
                <label for="preco">Preço</label>
                <input type="number" id="preco" name="preco" value="{{ servico.preco }}" step="0.01" required min="0" max="999999.99">
            </div>

            <div class="campo">
                <label for="duracao">Duração</label>
                <input type="text" id="duracao" name="duracao" value="{{ servico.duracao or '' }}" placeholder="Ex: 1h, 30min" maxlength="20" pattern="(\d+h)?(\d+min)?">
            </div>

            <div class="botoes">
                <button type="submit" class="btn">Salvar alterações</button>
                <a href="{{ url_for('servicos') }}" class="btn secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
