<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agenda Beauty</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(
135deg,
#F7E9EE,
#EFE6FA
);

}

.card{

background:white;
padding:40px;
width:360px;

border-radius:18px;

box-shadow:0 20px 40px rgba(0,0,0,0.08);

text-align:center;

}

.logo{

width:70px;
height:70px;

margin:auto;
margin-bottom:10px;

border-radius:20px;

display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(
135deg,
#D8B4E2,
#F2C6D6
);

color:white;
font-size:28px;
font-weight:bold;

}

h1{

margin-top:10px;
margin-bottom:5px;

}

.sub{

color:#777;
margin-bottom:25px;

}

input{

width:100%;
padding:13px;

margin-bottom:15px;

border-radius:10px;

border:1px solid #ddd;

font-size:15px;

}

input:focus{

outline:none;
border-color:#CBA3E6;

}

button{

width:100%;

padding:13px;

border:none;

border-radius:12px;

background:linear-gradient(
135deg,
#B085E8,
#9B6FCB
);

color:white;

font-size:16px;

cursor:pointer;

}

button:hover{

opacity:0.95;

}

.erro{

background:#ffdede;

padding:10px;

border-radius:8px;

margin-bottom:10px;

color:#a00000;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">A</div>

<h1>Entrar</h1>

<div class="sub">Acesse sua agenda</div>

{% if erro %}
<div class="erro">{{ erro }}</div>
{% endif %}

<form method="POST">

<input
type="text"
name="usuario"
placeholder="Usuário"
required
>

<input
type="password"
name="senha"
placeholder="Senha"
required
>

<button type="submit">
Entrar
</button>

</form>

</div>

</body>
</html>
