<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgendaFlow - Entrar</title>

<style>
*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#F7E9EE,#EFE6FA);
padding:20px;
}

.card{
background:white;
padding:40px;
width:360px;
border-radius:18px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
text-align:center;
}

.logo{
width:70px;
height:70px;
margin:auto;
margin-bottom:10px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#D8B4E2,#F2C6D6);
color:white;
font-size:28px;
font-weight:bold;
}

h1{
margin-top:10px;
margin-bottom:5px;
color:#3d3148;
}

.sub{
color:#777;
margin-bottom:18px;
}

.beneficio{
margin:0 0 22px;
padding:12px 14px;
border-radius:14px;
background:linear-gradient(135deg,rgba(216,180,226,0.18),rgba(242,198,214,0.22));
border:1px solid rgba(176,133,232,0.16);
color:#6b5877;
font-size:14px;
line-height:1.45;
}

.beneficio strong{
color:#8d63be;
}

input{
width:100%;
padding:13px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
transition:0.2s;
}

input:focus{
outline:none;
border-color:#CBA3E6;
box-shadow:0 0 0 3px rgba(203,163,230,0.12);
}

button{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#B085E8,#9B6FCB);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
opacity:0.95;
transform:translateY(-1px);
}

.erro{
background:#ffdede;
padding:10px;
border-radius:8px;
margin-bottom:10px;
color:#a00000;
font-size:14px;
}

.sucesso{
background:#eefcf3;
padding:10px;
border-radius:8px;
margin-bottom:10px;
color:#227a4d;
font-size:14px;
}

.link{
margin-top:15px;
font-size:14px;
color:#666;
}

.link a{
color:#9B6FCB;
text-decoration:none;
font-weight:bold;
}

.link a:hover{
text-decoration:underline;
}

.links-rodape{
margin-top:18px;
display:flex;
flex-direction:column;
gap:10px;
font-size:14px;
}

.links-rodape a{
color:#9B6FCB;
text-decoration:none;
font-weight:bold;
}

.links-rodape a:hover{
text-decoration:underline;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">A</div>

<h1>Entrar</h1>

<div class="sub">Acesse sua conta</div>

<div class="beneficio">
Teste grátis por <strong>7 dias</strong> para conhecer o AgendaFlow.
</div>

{% if erro %}
<div class="erro">{{ erro }}</div>
{% endif %}

{% if sucesso %}
<div class="sucesso">{{ sucesso }}</div>
{% endif %}

<form method="POST">

<input
type="email"
name="email"
placeholder="Seu e-mail"
required
>

<input
type="password"
name="senha"
placeholder="Senha"
required
>

<button type="submit">
Entrar
</button>

</form>

<div class="links-rodape">
<a href="{{ url_for('esqueci_senha') }}">Esqueci minha senha</a>

<div class="link">
Não tem conta?
<a href="{{ url_for('cadastro') }}">Criar conta</a>
</div>
</div>

</div>

</body>
</html>
